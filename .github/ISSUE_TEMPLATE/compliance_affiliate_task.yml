name: Compliance or affiliate task
description: Track disclosure, claim-safety, structured data, outbound, seller, or monetization work.
title: "[Compliance/Affiliate]: "
labels:
  - compliance
  - affiliate
  - lipflower
body:
  - type: textarea
    id: task
    attributes:
      label: Task
      description: Describe the compliance, affiliate, seller, or monetization change.
    validations:
      required: true
  - type: checkboxes
    id: affected_areas
    attributes:
      label: Affected areas
      options:
        - label: Affiliate disclosure
        - label: Outbound redirect routing
        - label: Seller or merchant copy
        - label: Structured data
        - label: Beauty claims or sensitivity language
        - label: Security or internal APIs
        - label: Environment variables
  - type: textarea
    id: verification
    attributes:
      label: Required verification
      description: List specific audits or manual checks needed.
      placeholder: npm run check:claims, npm run check:structured-data, npm run check:security
