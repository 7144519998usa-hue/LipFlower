name: Verify LipFlower

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "23 10 * * 1"
  workflow_dispatch:

concurrency:
  group: verify-lipflower-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Local QA and production build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NEXT_TELEMETRY_DISABLED: "1"
      LIPFLOWER_SITE_URL: "https://lipflower.com"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify site
        run: npm run verify
