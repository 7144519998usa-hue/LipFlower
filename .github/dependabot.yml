version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "11:15"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - lipflower
    commit-message:
      prefix: deps
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "11:45"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - github-actions
      - lipflower
    commit-message:
      prefix: ci
      include: scope
